---
- hosts: all

  collections:
    - vladgh.samba

  roles:
    ###
    ### Requirements
    ###
    - role: nas-users
      tags:
        - nas-users
        - nas

    - role: geerlingguy.nfs
      tags:
        - nfs
        - skip_ansible_lint

    - role: geerlingguy.docker
      tags:
        - docker
        - skip_ansible_lint

    ###
    ### NAS Roles
    ###
    - role: nas-general
      tags:
        - nas-general
        - nas

    - role: nas-docker
      tags:
        - nas-docker
        - nas

    ###
    ### Applications
    ###
    - role: homeassistant
      tags:
        - homeassistant
      when: (homeassistant_enabled | default(False))
