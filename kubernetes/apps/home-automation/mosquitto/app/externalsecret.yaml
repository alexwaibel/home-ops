---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mosquitto
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: mosquitto-secret
    template:
      engineVersion: v2
      data:
        mosquitto.conf: |
          listener 1883
          allow_anonymous false
          autosave_interval 60
          connection_messages false
          per_listener_settings false
          persistence true
          persistence_location /config
          password_file /mosquitto/config/mosquitto_pwd
        # docker run --rm eclipse-mosquitto:2.0.22 sh -c 'mosquitto_passwd -b -c /tmp/pwfile YOURUSERNAME YOURPASSWORD && cat /tmp/pwfile'
        mosquitto_pwd: "{{ .MQTT_PASSWORD_ENTRY }}"
  dataFrom:
    - extract:
        key: mosquitto
