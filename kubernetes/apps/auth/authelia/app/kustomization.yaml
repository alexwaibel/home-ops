---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - ../../components/sops

resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./secret.sops.yaml
configMapGenerator:
  - name: authelia-configmap
    files:
      - configuration.yaml=./resources/configuration.yaml
generatorOptions:
  disableNameSuffixHash: true
