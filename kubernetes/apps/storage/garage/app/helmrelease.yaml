---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  chartRef:
    kind: OCIRepository
    name: garage
  interval: 1h
  values:
    controllers:
      garage:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/dxflrs/garage
              tag: v1.1.0
            env:
              GARAGE_RPC_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: garage-secret
                    key: GARAGE_RPC_SECRET
            args: ["-c", "/etc/garage/garage.toml", "server"]
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3900
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [10000]
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: garage
        ports:
          s3:
            port: 3900
          rpc:
            port: 3901
          admin:
            port: 3903
    persistence:
      config:
        type: configMap
        name: garage-config
        globalMounts:
          - path: /etc/garage/garage.toml
            subPath: garage.toml
            readOnly: true
      data:
        type: nfs
        server: 192.168.20.11
        path: /data/garage
        globalMounts:
          - path: /data/garage
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
