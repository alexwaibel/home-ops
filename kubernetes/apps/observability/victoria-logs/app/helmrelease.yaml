---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    server:
      fullnameOverride: victoria-logs
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      retentionPeriod: 30d
      serviceMonitor:
        enabled: true
