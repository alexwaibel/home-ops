---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
configMapGenerator:
  - name: kube-state-metrics-config
    files:
      - kube-state-metrics.yaml=./resources/kube-state-metrics.yaml
generatorOptions:
  disableNameSuffixHash: true
