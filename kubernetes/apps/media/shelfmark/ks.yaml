---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app shelfmark
spec:
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: bookboss
      namespace: media
  interval: 1h
  path: ./kubernetes/apps/media/shelfmark/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
