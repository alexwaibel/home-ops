---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
spec:
  chartRef:
    kind: OCIRepository
    name: volsync
  dependsOn:
    - name: minio
      namespace: storage
    - name: snapshot-controller
      namespace: volsync-system
  interval: 1h
  values:
    image:
      repository: ghcr.io/perfectra1n/volsync
      tag: 0.17.11
    manageCRDs: true
    metrics:
      disableAuth: true
