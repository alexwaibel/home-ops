---
name: "Talos Validate"

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-job:
    name: Talos Validate Pre-Job
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: talos/**

  validate:
    name: Talos Validate
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: aqua:budimanjojo/talhelper aqua:siderolabs/talos

      - name: Generate Talos configs
        run: |
          talhelper gensecret > /tmp/talsecret.yaml
          talhelper genconfig \
            --config-file talos/talconfig.yaml \
            --env-file talos/talenv.yaml \
            --secret-file /tmp/talsecret.yaml \
            --out-dir /tmp/talos-config \
            --no-gitignore

      - name: Validate Talos configs
        run: |
          for f in /tmp/talos-config/*.yaml; do
            [ -f "$f" ] || continue
            echo "Validating $f"
            talosctl validate --mode metal --config "$f"
          done

  talos-validate-status:
    name: Talos Validate Success
    needs: [ "validate" ]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
