---
name: "Talos Validate"

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-job:
    name: Talos Validate Pre-Job
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: talos/**

  validate:
    name: Talos Validate
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install talhelper
        run: |
          curl -sSL https://github.com/budimanjojo/talhelper/releases/download/v3.1.9/talhelper_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin talhelper

      - name: Install talosctl
        run: |
          curl -sSL https://github.com/siderolabs/talos/releases/download/v1.13.0/talosctl-linux-amd64 \
            -o /usr/local/bin/talosctl
          chmod +x /usr/local/bin/talosctl

      - name: Generate Talos configs
        run: |
          talhelper gensecret > /tmp/talsecret.yaml
          talhelper genconfig \
            --config-file talos/talconfig.yaml \
            --env-file talos/talenv.yaml \
            --secret-file /tmp/talsecret.yaml \
            --out-dir /tmp/talos-config \
            --no-gitignore

      - name: Validate Talos configs
        run: |
          for f in /tmp/talos-config/*.yaml; do
            [ -f "$f" ] || continue
            echo "Validating $f"
            talosctl validate --mode metal --config "$f"
          done

  talos-validate-status:
    name: Talos Validate Success
    needs: ["validate"]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
